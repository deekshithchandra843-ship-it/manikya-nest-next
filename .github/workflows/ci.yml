name: Frontend CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: manikya-nest-next/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: manikya-nest-next

      - name: Run Linter
        run: npm run lint
        working-directory: manikya-nest-next

      - name: Build Frontend (Next.js)
        run: npm run build
        working-directory: manikya-nest-next
